# See docs at: https://mystmd.org/guide/frontmatter
version: 1
extends:
  - https://raw.githubusercontent.com/projectpythia/pythia-config/main/pythia.yml
project:
  title: Snow Observations Cookbook
  github: https://github.com/SnowEx/snow-observations-cookbook
  bibliography: references.bib
  authors:
    - name: The NASA Snow Observations Community
  copyright: '2025'
  toc:
    - file: README.md
    - title: Preamble
      children:
        - file: notebooks/how-to-cite.md
    - title: Data Access
      children:
        - file: notebooks/snowex_data_overview.ipynb
        - file: notebooks/snowexsql-database.ipynb
    - title: Observations
      children:
          - file: notebooks/GPR-lidar-tutorial.ipynb
          - file: notebooks/thermal-ir-tutorial.ipynb
          - file: notebooks/timelapse-camera-tutorial.ipynb
          - file: notebooks/uavsar-tutorial.ipynb
          - file: notebooks/microstructure-tutorial.ipynb
          - file: notebooks/aviris-ng-tutorial.ipynb     
          - file: notebooks/tls_data_access.ipynb
          - file: notebooks/snotel_data_access.ipynb
  error_rules:
    - rule: link-resolves
      severity: ignore
      keys:
        - 'https://lpdaac.usgs.gov/**'
        - 'https://journals.ametsoc.org/**'
        - 'https://www.earthdatascience.org/**'
        - 'https://ieeexplore.ieee.org/**'
        - 'https://hls.gsfc.nasa.gov/**'
        - 'https://www.gnu.org/**'
        - 'https://snowex-tutorials.s3.us-west-2.amazonaws.com/**'
        - 'https://github.com/**'
        - 'https://pandas.pydata.org/**'
        - 'https://snow.nasa.gov/**'
        - 'https://doi.org/**'
        - 'https://zenodo.org/**'
    - rule: doi-link-valid
      severity: ignore
      keys:
        - 'https://zenodo.org/**'   # also suppress the DOI validation error
